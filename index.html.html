<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETFLIX CLONE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--red:#E50914;--dark:#141414;--darker:#0a0a0a;--card-w:180px;--card-h:270px}
  body{background:var(--dark);color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 4%;display:flex;align-items:center;gap:32px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);transition:background .3s}
  nav.solid{background:var(--darker)}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--red);letter-spacing:2px;cursor:pointer;flex-shrink:0}
  .nav-links{display:flex;gap:20px}
  .nav-links a{color:#e5e5e5;text-decoration:none;font-size:13px;cursor:pointer;transition:color .2s}
  .nav-links a:hover,.nav-links a.active{color:#fff}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .search-box{display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.5);padding:6px 12px;cursor:pointer}
  .search-box input{background:none;border:none;color:#fff;font-size:13px;width:0;transition:width .3s;font-family:inherit;outline:none}
  .search-box.open input{width:160px}
  .avatar{width:32px;height:32px;border-radius:4px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;user-select:none}
  .hero{height:100vh;position:relative;display:flex;align-items:flex-end;padding:0 4% 12%}
  .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:background-image .6s}
  .hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.82) 0%,transparent 65%),linear-gradient(to top,rgba(20,20,20,1) 0%,transparent 45%)}
  .hero-content{position:relative;max-width:500px}
  .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(229,9,20,.15);border:1px solid rgba(229,9,20,.4);padding:5px 12px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#ff6b6b;margin-bottom:16px}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,7vw,88px);line-height:.95;margin-bottom:14px;text-shadow:2px 4px 24px rgba(0,0,0,.6)}
  .hero-meta{display:flex;align-items:center;gap:12px;margin-bottom:14px;font-size:13px;color:#aaa;flex-wrap:wrap}
  .hero-meta .match{color:#46d369;font-weight:600}
  .hero-meta .dot{width:3px;height:3px;border-radius:50%;background:#666;flex-shrink:0}
  .hero-desc{font-size:14px;color:#ccc;line-height:1.65;margin-bottom:24px}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap}
  .btn-play{display:flex;align-items:center;gap:8px;background:#fff;color:#000;border:none;padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s;border-radius:3px}
  .btn-play:hover{background:#ddd}
  .btn-list{display:flex;align-items:center;gap:8px;background:rgba(109,109,110,.65);color:#fff;border:1px solid rgba(255,255,255,.3);padding:12px 24px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .2s;border-radius:3px}
  .btn-list:hover{background:rgba(109,109,110,.9)}
  .btn-info{display:flex;align-items:center;gap:8px;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);padding:12px 20px;font-size:15px;cursor:pointer;font-family:inherit;transition:background .2s;border-radius:3px}
  .btn-info:hover{background:rgba(255,255,255,.1)}
  .rows-section{position:relative;z-index:2;padding:0 0 80px;margin-top:-60px}
  .row{padding:0 4%;margin-bottom:36px}
  .row-title{font-size:18px;font-weight:600;margin-bottom:14px;color:#e5e5e5}
  .row-title span{font-size:12px;color:#54b3d6;margin-left:8px;opacity:0;transition:opacity .2s;vertical-align:middle}
  .row:hover .row-title span{opacity:1}
  .row-track-wrapper{position:relative}
  .row-track{display:flex;gap:6px;overflow-x:auto;scroll-behavior:smooth;padding-bottom:8px;padding-top:8px}
  .row-track::-webkit-scrollbar{display:none}
  .arrow{position:absolute;top:0;bottom:8px;width:48px;background:rgba(20,20,20,.9);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;font-size:24px;color:#fff;opacity:0;transition:opacity .2s;border:none}
  .row-track-wrapper:hover .arrow{opacity:1}
  .arrow.left{left:0}.arrow.right{right:0}
  .card{flex-shrink:0;width:var(--card-w);cursor:pointer;position:relative;transition:transform .35s ease,z-index 0s .35s}
  .card-inner{width:100%;height:var(--card-h);border-radius:4px;overflow:hidden;position:relative;background:#1a1a1a}
  .card:hover{transform:scale(1.3);z-index:20;transition:transform .35s ease,z-index 0s}
  .card img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .4s}
  .card img.loading{opacity:0}
  .card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);text-align:center;padding:12px;line-height:1.4;position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e,#333)}
  .card-hover{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.95),transparent);padding:14px 10px 10px;opacity:0;transition:opacity .3s;pointer-events:none}
  .card:hover .card-hover{opacity:1}
  .card-hover-title{font-size:11px;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-hover-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .match-pct{font-size:10px;color:#46d369;font-weight:600}
  .card-hover-tag{font-size:9px;border:1px solid rgba(255,255,255,.4);padding:1px 4px;color:#aaa}
  .card-rank{position:absolute;top:6px;left:6px;background:var(--red);font-size:9px;font-weight:700;padding:2px 6px;z-index:2;border-radius:2px}
  .card-new{position:absolute;top:6px;right:6px;background:#46d369;color:#000;font-size:9px;font-weight:700;padding:2px 5px;z-index:2;border-radius:2px}
  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:#181818;width:min(860px,92vw);max-height:90vh;overflow-y:auto;border-radius:8px;position:relative}
  .modal::-webkit-scrollbar{width:4px}
  .modal::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
  .modal-hero{height:420px;position:relative;background:#111;overflow:hidden}
  .modal-hero img.backdrop{width:100%;height:100%;object-fit:cover;display:block}
  .modal-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,#181818 0%,rgba(24,24,24,.15) 60%,transparent 100%)}
  .modal-hero-content{position:absolute;bottom:0;left:0;right:0;padding:28px}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:46px;line-height:1;margin-bottom:16px;text-shadow:1px 2px 12px rgba(0,0,0,.8)}
  .modal-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .modal-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.25);color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10}
  .modal-close:hover{background:rgba(0,0,0,.9)}
  .modal-body{padding:24px 28px}
  .modal-stats{display:flex;gap:14px;margin-bottom:18px;font-size:13px;flex-wrap:wrap;align-items:center}
  .modal-stats .match{color:#46d369;font-weight:600;font-size:15px}
  .modal-stats .year,.modal-stats .dur{color:#aaa}
  .modal-stats .badge{border:1px solid rgba(255,255,255,.4);padding:1px 7px;font-size:11px;color:#aaa;border-radius:2px}
  .modal-desc{font-size:14px;color:#ccc;line-height:1.75;margin-bottom:20px}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;color:#ccc}
  .modal-grid span{color:#777}
  .more-like{margin-top:28px}
  .more-like h3{font-size:18px;font-weight:600;margin-bottom:14px}
  .similar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .similar-card{border-radius:4px;overflow:hidden;cursor:pointer;transition:transform .2s;background:#222}
  .similar-card:hover{transform:scale(1.03)}
  .similar-card-img{height:110px;overflow:hidden;background:#1a1a1a}
  .similar-card-img img{width:100%;height:100%;object-fit:cover;display:block}
  .similar-card-img .sc-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-align:center;padding:8px;background:linear-gradient(135deg,#1a1a2e,#333)}
  .similar-card-info{padding:8px 10px}
  .similar-card-info strong{font-size:12px;display:block;margin-bottom:2px}
  .similar-card-info p{font-size:11px;color:#aaa}
  /* YOUTUBE PLAYER */
  .yt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
  .yt-overlay.open{opacity:1;pointer-events:all}
  .yt-box{position:relative;width:min(900px,95vw);aspect-ratio:16/9}
  .yt-box iframe{width:100%;height:100%;border:none;border-radius:6px}
  .yt-close{position:absolute;top:-44px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}
  .yt-close:hover{color:#e50914}
  .yt-title{position:absolute;top:-44px;left:0;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;letter-spacing:1px}
  .no-trailer{padding:32px;text-align:center;color:#aaa;font-size:14px}
  /* TOAST */
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:#000;padding:10px 22px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;pointer-events:none;border-radius:4px;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  /* PROFILES */
  .profiles-screen{position:fixed;inset:0;background:var(--dark);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;opacity:0;pointer-events:none;transition:opacity .4s}
  .profiles-screen.active{opacity:1;pointer-events:all}
  .profiles-screen h1{font-size:clamp(24px,4vw,40px);font-weight:300}
  .profiles-grid{display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
  .profile-item{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:transform .2s}
  .profile-item:hover{transform:scale(1.06)}
  .profile-avatar{width:100px;height:100px;border-radius:6px;border:3px solid transparent;transition:border .2s;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:700;font-family:'Bebas Neue',sans-serif}
  .profile-item:hover .profile-avatar{border-color:#fff}
  .profile-name{font-size:14px;color:#808080;transition:color .2s;letter-spacing:1px}
  .profile-item:hover .profile-name{color:#e5e5e5}
  .btn-manage{background:transparent;color:#808080;border:1px solid #808080;padding:10px 32px;font-size:14px;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all .2s;border-radius:3px}
  .btn-manage:hover{border-color:#fff;color:#fff}
  @media(max-width:600px){
    :root{--card-w:130px;--card-h:195px}
    .hero-title{font-size:44px}.nav-links{display:none}
    .modal-grid{grid-template-columns:1fr}.similar-grid{grid-template-columns:repeat(2,1fr)}
    .hero-actions{flex-direction:column;align-items:flex-start}
    .modal-hero{height:240px}.modal-title{font-size:30px}.modal-body{padding:16px}

</head>

  </div>

  <div class="toast" id="toast"></div>
</div>

   ▲▲▲  END OF EDIT SECTION  ▲▲▲
══════════════════════════════════════════════════════════════ */

const ROWS_DEF = [
  {title:"🔥 Trending Now",            ids:[9,5,12,2,11,8,10,6,14]},
  {title:"Continue Watching",          ids:[1,7,3,15,4,13]},
  {title:"Rajamouli Universe",         ids:[5,6,1,2]},
  {title:"Prabhas Blockbusters",       ids:[1,2,3,11,12]},
  {title:"Mahesh Babu Hits",           ids:[7,4,13,15]},
  {title:"New Releases 2024",          ids:[9,12,14,11]},
  {title:"Top Picks for You",          ids:[5,10,8,6,2,1,12]},
  {title:"Action & Mass Entertainers", ids:[6,7,5,10,4,8,2,13,15]},
];

/* ── STATE ── */
let myList = [];
let heroIdx = 0;
let heroTimer = null;
const byId = id => MOVIES.find(m => m.id === id);

/* ── PROFILES ── */
function selectProfile(name) {
  const s = document.getElementById('profilesScreen');
  s.classList.remove('active');
  setTimeout(() => s.style.display = 'none', 400);
  document.getElementById('mainApp').style.display = 'block';
  if (name) document.getElementById('userAvatar').textContent = name[0].toUpperCase();
  initApp();
}
function toggleProfileMenu() {
  clearInterval(heroTimer);
  document.getElementById('mainApp').style.display = 'none';
  const s = document.getElementById('profilesScreen');
  s.style.display = 'flex';
  setTimeout(() => s.classList.add('active'), 10);
}

/* ── INIT ── */
function initApp() {
  renderHero(MOVIES[0]);
  renderRows();
  clearInterval(heroTimer);
  heroTimer = setInterval(() => {
    heroIdx = (heroIdx + 1) % MOVIES.length;
    renderHero(MOVIES[heroIdx]);
  }, 7000);
  window.addEventListener('scroll', () => {
    document.getElementById('mainNav').classList.toggle('solid', window.scrollY > 60);
  }, { passive: true });
}

/* ── HERO ── */
function renderHero(m) {
  const bg = document.getElementById('heroBg');
  // Use backdrop if available, else poster, else solid color
  const bgSrc = m.backdrop && !m.backdrop.includes('PUT_') ? m.backdrop
              : m.poster   && !m.poster.includes('PUT_')   ? m.poster
              : null;
  if (bgSrc) {
    bg.style.backgroundImage = `url('${bgSrc}')`;
  } else {
    bg.style.backgroundImage = '';
    bg.style.background = 'linear-gradient(135deg,#1a1a2e,#2a0a0a)';
  }
  const safe = m.title.replace(/'/g, "\\'");
  document.getElementById('heroContent').innerHTML = `
    <div class="hero-badge">&#9733; Featured Film</div>
    <div class="hero-title">${m.title}</div>
    <div class="hero-meta">
      <span class="match">&#9650; ${m.match}% Match</span>
      <div class="dot"></div><span>${m.year}</span>
      <div class="dot"></div><span>${m.dur}</span>
      <div class="dot"></div><span>${m.age}</span>
      ${m.tag ? `<div class="dot"></div><span>${m.tag}</span>` : ''}
    </div>
    <div class="hero-desc">${m.desc}</div>
    <div class="hero-actions">
      <button class="btn-play" onclick="playTrailer(${m.id})">&#9654; Play Trailer</button>
      <button class="btn-list" onclick="toggleList(${m.id})" id="heroListBtn${m.id}">
        ${myList.includes(m.id) ? '&#10003; In My List' : '+ My List'}
      </button>
      <button class="btn-info" onclick="openModal(${m.id})">&#9432; More Info</button>
    </div>`;
}

/* ── CARD ── */
function cardHtml(m, ci) {
  const hasPoster = m.poster && !m.poster.includes('PUT_');
  const imgHtml = hasPoster
    ? `<img src="${m.poster}" alt="${m.title}" loading="lazy" class="loading"
         onload="this.classList.remove('loading')"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const phStyle = hasPoster ? 'style="display:none"' : '';
  return `
    <div class="card" onclick="openModal(${m.id})" title="${m.title}">
      <div class="card-inner">
        ${imgHtml}
        <div class="card-placeholder" ${phStyle}>${m.title}</div>
        ${ci < 3 ? `<div class="card-rank">#${ci+1}</div>` : ''}
        ${ci === 0 ? `<div class="card-new">NEW</div>` : ''}
        <div class="card-hover">
          <div class="card-hover-title">${m.title}</div>
          <div class="card-hover-meta">
            <span class="match-pct">${m.match}%</span>
            <span class="card-hover-tag">${m.age}</span>
            <span class="card-hover-tag">${m.genre.split(' ')[0]}</span>
          </div>
        </div>
      </div>
    </div>`;
}

/* ── ROWS ── */
function renderRows() {
  document.getElementById('rowsSection').innerHTML = ROWS_DEF.map((row, ri) => `
    <div class="row">
      <div class="row-title">${row.title} <span>See All ›</span></div>
      <div class="row-track-wrapper">
        <button class="arrow left" onclick="scrollRow(${ri},-1)">&#8249;</button>
        <div class="row-track" id="track-${ri}">
          ${row.ids.map((id,ci) => { const m=byId(id); return m ? cardHtml(m,ci) : ''; }).join('')}
        </div>
        <button class="arrow right" onclick="scrollRow(${ri},1)">&#8250;</button>
      </div>
    </div>`).join('');
}
function scrollRow(ri,dir){
  const t=document.getElementById(`track-${ri}`);
  if(t) t.scrollBy({left:dir*580,behavior:'smooth'});
}

/* ── YOUTUBE PLAYER ── */
function playTrailer(id) {
  const m = byId(id);
  if (!m) return;
  if (!m.trailer || m.trailer === 'PUT_YOUTUBE_ID_HERE') {
    showToast('Trailer not added yet for ' + m.title);
    return;
  }
  document.getElementById('ytTitle').textContent = m.title + ' — TRAILER';
  document.getElementById('ytFrame').innerHTML =
    `<iframe src="https://www.youtube.com/embed/${m.trailer}?autoplay=1&rel=0"
      width="100%" height="100%"
      allow="autoplay; fullscreen"
      allowfullscreen style="border:none;border-radius:6px"></iframe>`;
  document.getElementById('ytOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeTrailer(e) {
  if (!e || e.target === document.getElementById('ytOverlay')) {
    document.getElementById('ytFrame').innerHTML = ''; // stops video
    document.getElementById('ytOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

/* ── INFO MODAL ── */
function openModal(id) {
  const m = byId(id);
  if (!m) return;
  const mh = document.getElementById('modalHero');
  const bdSrc = m.backdrop && !m.backdrop.includes('PUT_') ? m.backdrop
              : m.poster   && !m.poster.includes('PUT_')   ? m.poster : null;
  mh.innerHTML = `
    ${bdSrc ? `<img class="backdrop" src="${bdSrc}" alt="${m.title}">` : '<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#333)"></div>'}
    <div class="modal-hero-overlay"></div>
    <div class="modal-hero-content" id="modalHeroContent"></div>`;

  document.getElementById('modalHeroContent').innerHTML = `
    <div class="modal-title">${m.title}</div>
    <div class="modal-actions">
      <button class="btn-play" onclick="playTrailer(${m.id})">&#9654; Play Trailer</button>
      <button class="btn-list" onclick="toggleList(${m.id})" id="modalListBtn${m.id}">
        ${myList.includes(m.id) ? '&#10003; My List' : '+ My List'}
      </button>
      <button style="background:none;border:1px solid rgba(255,255,255,.5);color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px" onclick="showToast('Liked! &#128077;')">&#128077;</button>
    </div>`;

  const similar = MOVIES.filter(x => x.id !== id).slice(0, 6);
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-stats">
      <span class="match">&#9650; ${m.match}% Match</span>
      <span class="year">${m.year}</span>
      <span class="dur">${m.dur}</span>
      <span class="badge">HD</span>
      <span class="badge">${m.age}</span>
      ${m.tag ? `<span class="badge">${m.tag}</span>` : ''}
    </div>
    <div class="modal-desc">${m.desc}</div>
    <div class="modal-grid">
      <div><span>Genre: </span>${m.genre}</div>
      <div><span>Director: </span>${m.dir}</div>
      <div style="grid-column:1/-1"><span>Cast: </span>${m.cast}</div>
    </div>
    <div class="more-like">
      <h3>More Like This</h3>
      <div class="similar-grid">
        ${similar.map(x => {
          const hasPx = x.poster && !x.poster.includes('PUT_');
          return `<div class="similar-card" onclick="openModal(${x.id})">
            <div class="similar-card-img">
              ${hasPx ? `<img src="${x.poster}" alt="${x.title}" loading="lazy">` : `<div class="sc-ph">${x.title}</div>`}
            </div>
            <div class="similar-card-info">
              <strong>${x.title}</strong>
              <p>${x.year} &middot; ${x.genre}</p>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

/* ── MY LIST ── */
function toggleList(id) {
  if (myList.includes(id)) { myList = myList.filter(x => x !== id); showToast('Removed from My List'); }
  else { myList.push(id); showToast('Added to My List ✓'); }
  [`heroListBtn${id}`,`modalListBtn${id}`].forEach(bid => {
    const b = document.getElementById(bid);
    if(b) b.innerHTML = myList.includes(id) ? '&#10003; In My List' : '+ My List';
  });
}

/* ── NAV / SEARCH ── */
function setPage(page, el) {
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  if (page === 'mylist') {
    const items = myList.map(id => byId(id)).filter(Boolean);
    const sec = document.getElementById('rowsSection');
    if (!items.length) { sec.innerHTML = `<div style="padding:6% 4%;color:#aaa;font-size:15px;text-align:center">Your list is empty!</div>`; return; }
    sec.innerHTML = `<div class="row"><div class="row-title">My List</div><div class="row-track-wrapper"><div class="row-track">${items.map((m,ci)=>cardHtml(m,ci)).join('')}</div></div></div>`;
  } else { renderRows(); }
}
function toggleSearch(e) {
  if (e) e.stopPropagation();
  const box = document.getElementById('searchBox');
  box.classList.toggle('open');
  if (box.classList.contains('open')) document.getElementById('searchInput').focus();
}
function doSearch(val) {
  if (!val.trim()) { renderRows(); return; }
  const q = val.toLowerCase();
  const results = MOVIES.filter(m =>
    m.title.toLowerCase().includes(q) || m.genre.toLowerCase().includes(q) ||
    m.cast.toLowerCase().includes(q)  || m.dir.toLowerCase().includes(q)
  );
  const sec = document.getElementById('rowsSection');
  if (!results.length) { sec.innerHTML = `<div style="padding:6% 4%;color:#aaa;font-size:15px">No results for "${val}"</div>`; return; }
  sec.innerHTML = `<div class="row"><div class="row-title">Results for "${val}"</div><div class="row-track-wrapper"><div class="row-track">${results.map((m,ci)=>cardHtml(m,ci)).join('')}</div></div></div>`;
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeTrailer(); }
});
</script>
